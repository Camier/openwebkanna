[tasks."smiles:extract"]
description = "Run SMILES extraction for one paper"
run = "if command -v micromamba >/dev/null 2>&1; then micromamba run -n smiles-extraction python scripts/extract_smiles_from_images.py --paper ${PAPER:?Set PAPER=...} --backend-order ${BACKEND_ORDER:-molscribe,decimer} --molscribe-command \"micromamba run -n molscribe-legacy python smiles-pipeline/archive/legacy-v1/molscribe_predict.py\" ${ARGS:-}; else python scripts/extract_smiles_from_images.py --paper ${PAPER:?Set PAPER=...} --backend-order ${BACKEND_ORDER:-molscribe,decimer} ${ARGS:-}; fi"

[tasks."smiles:extract-all"]
description = "Run SMILES extraction for all papers"
run = "if command -v micromamba >/dev/null 2>&1; then micromamba run -n smiles-extraction python scripts/extract_smiles_from_images.py --all --backend-order ${BACKEND_ORDER:-molscribe,decimer} --molscribe-command \"micromamba run -n molscribe-legacy python smiles-pipeline/archive/legacy-v1/molscribe_predict.py\" ${ARGS:-}; else python scripts/extract_smiles_from_images.py --all --backend-order ${BACKEND_ORDER:-molscribe,decimer} ${ARGS:-}; fi"

[tasks."smiles:embed"]
description = "Build multimodal chunks with optional molecule metadata"
run = "python scripts/embed_images_in_chunks.py --paper ${PAPER:?Set PAPER=...} --include-molecule-metadata ${ARGS:-}"

[tasks."smiles:validate"]
description = "Validate smiles_extracted.json and molecules.jsonl outputs"
run = "python scripts/validate_smiles_outputs.py ${ARGS:-}"

[tasks."smiles:high-confidence"]
description = "Filter molecules.jsonl into high-confidence subset"
run = "if command -v micromamba >/dev/null 2>&1; then micromamba run -n smiles-extraction python smiles-pipeline/archive/legacy-v1/filter_high_confidence_smiles.py ${ARGS:-}; else python smiles-pipeline/archive/legacy-v1/filter_high_confidence_smiles.py ${ARGS:-}; fi"

[tasks."smiles:qa-summary"]
description = "Generate per-paper QA summary JSON"
run = "python smiles-pipeline/archive/legacy-v1/smiles_qa_summary.py ${ARGS:-}"

[tasks."smiles:publish-kb"]
description = "Upload high-confidence molecule artifacts to OpenWebUI KB"
run = "bash ./smiles-pipeline/import-smiles-to-kb.sh --source-root /LAB/@thesis/openwebui/prod_max --file-name molecules_high_confidence.jsonl --kb-name \"${KB_NAME:-Molecular SMILES High Confidence}\" --kb-description \"${KB_DESCRIPTION:-High-confidence molecular extractions for retrieval}\" ${ARGS:-}"

[tasks."smiles:publish-kb-markdown"]
description = "Upload markdown-rendered high-confidence molecule artifacts to OpenWebUI KB"
run = "bash ./smiles-pipeline/import-smiles-to-kb.sh --source-root /LAB/@thesis/openwebui/prod_max --file-name molecules_high_confidence.jsonl --convert-markdown --markdown-file \"${MARKDOWN_FILE_NAME:-molecules_high_confidence.md}\" --markdown-title \"${MARKDOWN_TITLE:-SMILES High Confidence Molecules}\" --kb-name \"${KB_NAME:-Molecular SMILES High Confidence Markdown}\" --kb-description \"${KB_DESCRIPTION:-High-confidence molecular extractions rendered as markdown for retrieval}\" ${ARGS:-}"

[tasks."smiles:kb-dedupe"]
description = "Remove duplicate same-name KB entries while keeping one ID"
run = "bash ./smiles-pipeline/archive/legacy-v1/dedupe-smiles-kb.sh --kb-name \"${KB_NAME:-Molecular SMILES High Confidence}\" ${ARGS:-}"

[tasks."smiles:pipeline"]
description = "Run bounded extraction + embed + validation"
run = "if command -v micromamba >/dev/null 2>&1; then micromamba run -n smiles-extraction python scripts/extract_smiles_from_images.py --all --limit ${LIMIT:-1} --backend-order ${BACKEND_ORDER:-molscribe,decimer} --write-molecules-jsonl --molscribe-command \"micromamba run -n molscribe-legacy python smiles-pipeline/archive/legacy-v1/molscribe_predict.py\" ${EXTRACT_ARGS:-}; else python scripts/extract_smiles_from_images.py --all --limit ${LIMIT:-1} --backend-order ${BACKEND_ORDER:-molscribe,decimer} --write-molecules-jsonl ${EXTRACT_ARGS:-}; fi && python scripts/embed_images_in_chunks.py --limit ${LIMIT:-1} --include-molecule-metadata ${EMBED_ARGS:-} && python scripts/validate_smiles_outputs.py --limit ${LIMIT:-1} && if command -v micromamba >/dev/null 2>&1; then micromamba run -n smiles-extraction python smiles-pipeline/archive/legacy-v1/filter_high_confidence_smiles.py --limit ${LIMIT:-1} ${FILTER_ARGS:-}; else python smiles-pipeline/archive/legacy-v1/filter_high_confidence_smiles.py --limit ${LIMIT:-1} ${FILTER_ARGS:-}; fi && python smiles-pipeline/archive/legacy-v1/smiles_qa_summary.py --limit ${LIMIT:-1} --output smiles_qa_summary.json ${QA_ARGS:-}"

[tasks."smiles:eval-retrieval"]
description = "Evaluate text+SMILES channel Recall@k and RRF fusion"
run = "if command -v micromamba >/dev/null 2>&1; then micromamba run -n smiles-extraction python smiles-pipeline/scripts/evaluate_retrieval_channels.py --input ${INPUT:-smiles-pipeline/config/retrieval_eval_sample.json} --k ${K:-5,10} --rrf-k ${RRF_K:-60} ${ENABLE_SMILES_EMBEDDING:+--enable-smiles-embedding} ${ARGS:-}; else python smiles-pipeline/scripts/evaluate_retrieval_channels.py --input ${INPUT:-smiles-pipeline/config/retrieval_eval_sample.json} --k ${K:-5,10} --rrf-k ${RRF_K:-60} ${ENABLE_SMILES_EMBEDDING:+--enable-smiles-embedding} ${ARGS:-}; fi"
