version: 2026-03-20
run_modes:
  - name: docker-primary
    description: Default supported operator mode using root shell entrypoints backed by canonical config surfaces.
    status: supported
    evidence:
      - deploy.sh
      - status.sh
      - config/compose/docker-compose.yml
      - config/README.md
      - scripts/check-doc-consistency.sh
  - name: docker-rg-build-variant
    description: OpenWebUI-only build override that swaps the image build to Dockerfile.openwebui-rg.
    status: supported
    evidence:
      - config/compose/docker-compose.rg.yml
      - config/docker/Dockerfile.openwebui-rg
  - name: host-assisted-upstreams
    description: The Docker stack depends on host-provided resources such as LiteLLM and a host-mounted Zotero directory.
    status: supported
    evidence:
      - config/env/.env.example
      - config/compose/docker-compose.yml
      - README.md
  - name: host-native-canonical-rag
    description: Canonical future multimodal retrieval API that queries Qdrant `rag_evidence` directly through one-collection text and visual lanes.
    status: supported
    evidence:
      - services/README.md
      - README.md
      - services/multimodal_retrieval_api/service.py
  - name: optional-profile-sidecars
    description: Legacy or optional services that are started only when explicit feature flags or profiles are enabled.
    status: supported
    evidence:
      - config/compose/docker-compose.yml
      - deploy.sh
      - README.md
  - name: kubernetes-or-system-services
    description: No supported Kubernetes, Helm, Procfile, or systemd topology is currently evidenced in the tracked operator trees.
    status: unsupported
    evidence:
      - "find config docs scripts archive -type f \\( -name 'Procfile' -o -name '*.service' -o -name 'Chart.yaml' -o -name 'values*.yaml' \\) -print"
services:
  - name: openwebui
    critical: true
    role: Primary UI and orchestration surface for RAG, tools, and user workflows.
    critical_reason:
      - user-entrypoint
      - critical-path
      - multi-dependent
    run_mode: docker-primary
    evidence:
      - config/compose/docker-compose.yml
      - README.md
  - name: litellm
    critical: true
    role: Primary OpenAI-compatible upstream for model discovery and generation.
    critical_reason:
      - critical-path
      - external-adapter
    run_mode: host-assisted-upstreams
    evidence:
      - config/env/.env.example
      - README.md
      - status.sh
  - name: postgres
    critical: true
    role: Stateful Postgres and pgvector service for application data and the default OpenWebUI vector backend in this repo.
    critical_reason:
      - persistence
      - critical-path
      - multi-dependent
    run_mode: docker-primary
    notes:
      - OpenWebUI now defaults to VECTOR_DB=pgvector in config/env/.env.example, so postgres backs the baseline retrieval path in this repo.
    evidence:
      - config/compose/docker-compose.yml
      - config/env/.env.example
  - name: jupyter
    critical: true
    role: Code execution backend used by OpenWebUI.
    critical_reason:
      - critical-path
      - multi-dependent
    run_mode: docker-primary
    evidence:
      - config/compose/docker-compose.yml
      - config/env/.env.example
      - config/jupyter/jupyter_server_config.py
  - name: mcpo
    critical: true
    role: MCP-to-OpenAPI bridge for tool exposure into OpenWebUI.
    critical_reason:
      - critical-path
      - external-adapter
    run_mode: docker-primary
    evidence:
      - config/compose/docker-compose.yml
      - config/mcp/config.json
  - name: docling
    critical: true
    role: Multimodal extraction backend used during document ingest.
    critical_reason:
      - critical-path
      - multi-dependent
    run_mode: docker-primary
    evidence:
      - config/compose/docker-compose.yml
      - README.md
  - name: searxng
    critical: false
    role: Local web-search backend for OpenWebUI web search when enabled.
    run_mode: optional-profile-sidecars
    notes:
      - Service is only needed when OpenWebUI web search is enabled, and ENABLE_WEB_SEARCH=false in config/env/.env.example keeps it off by default.
    evidence:
      - config/compose/docker-compose.yml
      - config/env/.env.example
      - config/searxng/settings.yml
  - name: open-terminal
    critical: false
    role: Optional terminal and file-server sidecar.
    run_mode: optional-profile-sidecars
    evidence:
      - config/compose/docker-compose.yml
      - config/env/.env.example
      - README.md
  - name: indigo-service
    critical: false
    role: Optional Indigo-based chemistry REST sidecar.
    run_mode: optional-profile-sidecars
    evidence:
      - config/compose/docker-compose.yml
      - config/env/.env.example
      - README.md
  - name: multimodal_retrieval_api
    critical: false
    role: Canonical future retrieval API for one-collection multimodal RAG over `rag_evidence`.
    run_mode: host-native-canonical-rag
    notes:
      - Service is the target RAG runtime for this repo, but it is not yet part of the compose baseline and is still operated separately during migration.
      - Live retrieval is native to this repo and no longer delegates to thesis_graph.
      - "`/ready` includes sampled `rag_evidence` collection-completeness checks for native `figure_records`."
    evidence:
      - services/README.md
      - README.md
      - services/multimodal_retrieval_api/service.py
critical_paths:
  - name: deploy-run-baseline
    description: Baseline operator path from environment configuration into the compose-managed runtime.
    path:
      - operator
      - .env
      - deploy.sh
      - config/compose/docker-compose.yml
      - postgres
      - jupyter
      - mcpo
      - docling
      - openwebui
      - status.sh
      - test scripts
    evidence:
      - README.md
      - deploy.sh
      - config/compose/docker-compose.yml
      - status.sh
  - name: query-generation-default
    description: Default committed OpenWebUI query path with pgvector as the vector backend.
    path:
      - browser
      - openwebui
      - postgres-pgvector
      - litellm-host
      - upstream-provider
    evidence:
      - config/env/.env.example
      - config/compose/docker-compose.yml
      - README.md
  - name: query-generation-chroma-fallback
    description: Optional OpenWebUI query path when VECTOR_DB=chroma is explicitly enabled.
    path:
      - browser
      - openwebui
      - chroma-in-openwebui-data
      - litellm-host
      - upstream-provider
    evidence:
      - config/env/.env.example
      - config/compose/docker-compose.yml
  - name: native-multimodal-retrieval-api
    description: Canonical future host-native multimodal retrieval path over the `rag_evidence` one-collection index.
    path:
      - client
      - multimodal_retrieval_api
      - qdrant-rag_evidence
      - text-lane
      - visual-lane
    notes:
      - This is the target RAG architecture, but the compose-managed OpenWebUI pgvector path remains the current baseline during migration.
      - "`rag_evidence` is the sole runtime evidence source."
      - Missing figure payloads surface as runtime diagnostics instead of falling back to local extraction artifacts.
      - "`/ready` samples page payload completeness and can mark the service degraded when native `figure_records` coverage is incomplete."
    evidence:
      - services/README.md
      - README.md
      - services/multimodal_retrieval_api/service.py
  - name: ingest
    description: Import scripts feed the OpenWebUI knowledge APIs.
    path:
      - import-pdfs-to-kb.sh
      - openwebui-apis
      - openwebui-data
    evidence:
      - import-pdfs-to-kb.sh
      - README.md
  - name: eval-regression
    description: Local scripts validate runtime and retrieval behavior.
    path:
      - local-scripts
      - compose-services
      - artifacts
    evidence:
      - test-rag.sh
      - test-api.sh
      - .mise.toml
drift_checks:
  - config/* is the canonical edit surface for committed runtime behavior.
  - Compose environment fallbacks should match config/env/.env.example, especially for baseline retrieval flags such as VECTOR_DB and ENABLE_RAG_HYBRID_SEARCH.
  - Postgres is always deployed and the committed OpenWebUI default now uses VECTOR_DB=pgvector; if a local runtime switches back to chroma, document that as an intentional override.
  - Optional sidecars should stay disabled in the normal baseline unless a concrete workflow requires them.
  - multimodal_retrieval_api is the canonical future RAG path; docs should distinguish that target architecture from the current compose-managed OpenWebUI baseline until migration completes.
  - Operator-facing docs and env templates should expose direct /health, /ready, and POST /api/v1/retrieve probes for the target host-native service without relabeling the current baseline as already migrated.
  - The native multimodal retrieval path targets `rag_evidence` directly and should not be described as delegating to thesis_graph.
  - Legacy project containers outside the current compose config should be removed instead of being carried forward as supported topology.
observed_runtime:
  observed_at: 2026-03-13
  evidence:
    - .env
    - status.sh
    - docker compose --project-directory . -f config/compose/docker-compose.yml config --services
    - docker compose --project-directory . -f config/compose/docker-compose.yml ps --format json
  live_ui_url: http://localhost:3000
  openwebui_image: ghcr.io/open-webui/open-webui:v0.8.10
  vector_db: pgvector
  embedding_model: pritamdeka/S-PubMedBert-MS-MARCO
  web_search_enabled: false
  searxng_host_port: 8888
  optional_sidecars: []
  optional_tools: []
  legacy_project_containers: []
